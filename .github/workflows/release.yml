name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

env:
  WAILS_VERSION: v2.12.0

jobs:
  build-macos-arm64:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${WAILS_VERSION}

      - name: Test
        run: go test ./...

      - name: Build macOS arm64 app
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          wails build -clean -platform darwin/arm64

      - name: Archive macOS arm64 app
        run: |
          mkdir -p release
          APP_PATH="$(find build/bin -maxdepth 1 -type d -name '*.app' | head -n 1)"
          test -n "$APP_PATH"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" release/cdn-iptester-darwin-arm64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-arm64
          path: release/cdn-iptester-darwin-arm64.zip

  build-macos-amd64:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${WAILS_VERSION}

      - name: Test
        run: go test ./...

      - name: Build macOS amd64 app
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          wails build -clean -platform darwin/amd64

      - name: Archive macOS amd64 app
        run: |
          mkdir -p release
          APP_PATH="$(find build/bin -maxdepth 1 -type d -name '*.app' | head -n 1)"
          test -n "$APP_PATH"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" release/cdn-iptester-darwin-amd64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-amd64
          path: release/cdn-iptester-darwin-amd64.zip

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Wails CLI
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@${env:WAILS_VERSION}
          Add-Content $env:GITHUB_PATH "$(go env GOPATH)\bin"

      - name: Test
        run: go test ./...

      - name: Build Windows app
        run: wails build -clean -platform windows/amd64

      - name: Archive Windows app
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          $ExePath = Get-ChildItem build/bin -Filter *.exe -File | Select-Object -First 1
          if (-not $ExePath) { throw "Windows build output not found" }
          Compress-Archive -Path $ExePath.FullName -DestinationPath release/cdn-iptester-windows-amd64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: release/cdn-iptester-windows-amd64.zip

  publish-release:
    runs-on: ubuntu-latest
    needs: [build-macos-arm64, build-macos-amd64, build-windows]

    steps:
      - name: Download macOS arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: release-macos-arm64
          path: release

      - name: Download macOS amd64 artifact
        uses: actions/download-artifact@v4
        with:
          name: release-macos-amd64
          path: release

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: release

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          name: CDN-IPtester ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release/cdn-iptester-darwin-arm64.zip
            release/cdn-iptester-darwin-amd64.zip
            release/cdn-iptester-windows-amd64.zip
